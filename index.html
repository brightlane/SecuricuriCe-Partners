  <style>
    :root {
      --primary: #6c5ce7;
      --primary-light: #a8b0ff;
      --primary-dark: #564ab1;
      --secondary: #00cec9;
      --neutral-light: #f8f9fa;
      --neutral: #6c757d;
      --neutral-dark: #343a40;
      --danger: #e74c3c;
      --success: #2ecc71;
      --border-radius: 12px;
      --shadow: 0 10px 30px rgba(0,0,0,0.12);
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.1);
      --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #111;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* Sticky header */
    .nav-container {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: linear-gradient(180deg, #ffffffcc 0%, #ffffffcc 50%, #ffffff 100%);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .nav-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .logo {
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--primary-dark);
      text-decoration: none;
    }

    .logo span {
      color: var(--secondary);
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--neutral-dark);
      font-size: 0.9rem;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .lang-switch {
      position: relative;
      margin-left: 0.5rem;
      font-size: 0.85rem;
    }

    .lang-switch select {
      background: none;
      border: none;
      outline: none;
      color: var(--neutral-dark);
      font-size: 0.85rem;
      cursor: pointer;
    }

    /* Red urgency bar */
    .urgency-bar {
      position: sticky;
      top: 0;
      z-index: 999;
      background: var(--danger);
      color: white;
      text-align: center;
      padding: 0.5rem 0;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      margin-bottom: 0.5rem;
      display: none; /* controlled by JS */
    }

    .urgency-bar.show {
      display: block;
    }

    /* Hero section */
    .hero {
      margin: 0 auto;
      padding: 4rem 1rem 3rem;
      max-width: 1200px;
      text-align: center;
      background: radial-gradient(circle at bottom right, #ffffff, #f1f3f9);
      border-radius: 0 0 var(--border-radius) var(--border-radius);
      box-shadow: var(--shadow);
    }

    .hero h1 {
      font-size: 2.2rem;
      margin-bottom: 0.6rem;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    .hero p {
      max-width: 600px;
      margin: 0 auto 1.5rem;
      color: var(--neutral-dark);
      font-size: 0.95rem;
    }

    .hero-cta {
      display: inline-block;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-weight: 700;
      text-decoration: none;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: 0 10px 25px rgba(108, 92, 231, 0.35);
      transition: transform var(--transition), box-shadow var(--transition);
      animation: bounce 2s infinite;
    }

    .hero-cta:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 14px 35px rgba(108, 92, 231, 0.45);
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    .sales-proof {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--neutral);
    }

    .sales-proof strong {
      color: var(--primary-dark);
    }

    /* Features grid */
    .section {
      max-width: 1200px;
      margin: 2.5rem auto 2rem;
      padding: 0 1rem;
    }

    .section-title {
      text-align: center;
      margin-bottom: 1.8rem;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--neutral-dark);
    }

    .features-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.2rem;
    }

    @media (min-width: 768px) {
      .features-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .features-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .feature-card {
      padding: 1.5rem;
      border-radius: var(--border-radius);
      background: white;
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition), box-shadow var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .feature-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .feature-icon {
      font-size: 2.2rem;
      margin-bottom: 0.8rem;
      color: var(--primary);
    }

    .feature-card h3 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .feature-card p {
      color: var(--neutral);
      font-size: 0.9rem;
    }

    /* Results stats */
    .results-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    @media (min-width: 768px) {
      .results-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .results-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .stat-card {
      padding: 1rem;
      text-align: center;
      border-radius: var(--border-radius);
      background: white;
      box-shadow: var(--shadow-sm);
    }

    .stat-card strong {
      font-size: 1.4rem;
      color: var(--primary-dark);
      display: block;
    }

    .stat-card span {
      font-size: 0.8rem;
      color: var(--neutral-dark);
    }

    /* Testimonials */
    .testimonial-carousel {
      position: relative;
      overflow: hidden;
      margin: 2rem auto;
      max-width: 1000px;
    }

    .testimonial-track {
      display: flex;
      transition: transform var(--transition);
    }

    .testimonial {
      min-width: 100%;
      padding: 1.5rem;
      border-radius: var(--border-radius);
      background: white;
      box-shadow: var(--shadow-sm);
      text-align: center;
    }

    .testimonial p {
      margin-bottom: 0.8rem;
      font-style: italic;
      color: var(--neutral-dark);
    }

    .testimonial cite {
      font-size: 0.9rem;
      color: var(--neutral);
    }

    .carousel-nav {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 0.8rem;
    }

    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #dee2e6;
      cursor: pointer;
      transition: background var(--transition);
    }

    .carousel-dot.active {
      background: var(--primary);
    }

    /* Pricing */
    .pricing-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.2rem;
    }

    @media (min-width: 768px) {
      .pricing-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .pricing-grid {
        grid-template-columns: 1fr 1.5fr 1fr;
        gap: 1.5rem;
      }
    }

    .pricing-card {
      padding: 1.8rem 1.5rem;
      border-radius: var(--border-radius);
      background: white;
      box-shadow: var(--shadow-sm);
      text-align: center;
      position: relative;
      border: 1px solid #dee2e6;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .pricing-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: var(--primary-light);
    }

    .pricing-card.featured::before {
      content: 'MOST POPULAR';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      background: var(--primary);
      color: white;
      border-radius: 999px;
    }

    .pricing-card h3 {
      margin-bottom: 0.5rem;
      font-size: 1.2rem;
    }

    .pricing-card .price {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 0.5rem;
    }

    .pricing-card .price span {
      font-size: 0.8rem;
      color: var(--neutral);
    }

    .pricing-card ul {
      list-style: none;
      margin: 1rem 0;
      text-align: left;
    }

    .pricing-card li {
      margin-bottom: 0.4rem;
      color: var(--neutral-dark);
      font-size: 0.9rem;
    }

    .pricing-card a {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      color: white;
      box-shadow: 0 6px 15px rgba(108, 92, 231, 0.25);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .pricing-card a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(108, 92, 231, 0.35);
    }

    /* FAQ */
    .faq-container {
      margin-top: 1.5rem;
    }

    .faq-item {
      margin-bottom: 1rem;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      overflow: hidden;
    }

    .faq-header {
      padding: 1rem;
      background: white;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      color: var(--neutral-dark);
    }

    .faq-header::after {
      content: '+';
      font-size: 1.2rem;
    }

    .faq-header.active::after {
      content: '−';
    }

    .faq-body {
      padding: 0 1rem 1rem;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.4s ease;
    }

    .faq-body.open {
      max-height: 200px;
      padding-top: 0;
    }

    .faq-body p {
      margin: 0.5rem 0;
      color: var(--neutral-dark);
      font-size: 0.9rem;
    }

    /* Disclosure */
    .affiliate-disclosure {
      margin: 2rem auto 1rem;
      max-width: 1000px;
      padding: 1rem;
      font-size: 0.8rem;
      color: var(--neutral);
      background: white;
      border-radius: var(--border-radius);
      border: 1px solid #dee2e6;
    }

    /* Footer */
    .footer {
      margin-top: 3rem;
      padding: 1.8rem 1rem 2rem;
      background: linear-gradient(180deg, #f8f9fa 0%, #e9ecef 100%);
      border-top: 1px solid #dee2e6;
    }

    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    @media (min-width: 768px) {
      .footer-content {
        grid-template-columns: 1fr 1fr;
      }
    }

    .footer-logo {
      font-weight: 700;
      color: var(--primary-dark);
      font-size: 1.1rem;
    }

    .footer-logo span {
      color: var(--secondary);
    }

    .footer p {
      font-size: 0.85rem;
      color: var(--neutral);
      margin-bottom: 0.4rem;
    }

    .footer-links {
      display: flex;
      gap: 0.8rem;
    }

    .footer-links a {
      font-size: 0.85rem;
      color: var(--neutral-dark);
      text-decoration: none;
    }

    .footer-links a:hover {
      color: var(--primary);
    }

      display: flex
